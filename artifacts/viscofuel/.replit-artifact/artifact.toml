kind = "web"
previewPath = "/"
title = "ViscoFuel"
version = "1.0.0"
id = "artifacts/viscofuel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18339

[services.development]
run = "pnpm --filter @workspace/viscofuel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viscofuel", "run", "build" ]
publicDir = "artifacts/viscofuel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18339"
BASE_PATH = "/"
